<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Libros Leídos - Home</title>
    <link rel="stylesheet" href="libros.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="header">
        <nav>
            <span class="logo">AUDIOLIBROS ESCUCHADOS</span>
            <div class="nav-links">
                <a href="mis-libros.html" class="nav-link">Mis libros leídos</a>
                <span id="user-info" class="user-info"></span>
                <button id="logout-btn" class="logout-btn" onclick="logout()" style="display: none;">Cerrar Sesión</button>
                <a href="login.html" id="login-link" class="nav-link" style="display: none;">Iniciar Sesión</a>
            </div>
        </nav>
    </header>
    <main class="main-busqueda">
        <div class="search-panel">
            <div class="busqueda-centrada">
                <div class="busqueda-opciones" style="display:flex; gap:1.5rem; margin-bottom:0.7rem; align-items:center;">
                    <label style="display:flex; align-items:center; gap:0.3rem;">
                        <input type="checkbox" id="check-titulo" checked>
                        Título
                    </label>
                    <label style="display:flex; align-items:center; gap:0.3rem;">
                        <input type="checkbox" id="check-autor">
                        Autor
                    </label>
                </div>
                <form id="book-form">
                    <input type="text" id="title" class="busqueda-input" placeholder="Buscar libro por título o autor..." required>
                    <button type="submit" class="busqueda-btn">Buscar</button>
                </form>
                <div id="orden-container" style="display:none; justify-content: flex-end; margin-top: 0.5rem;">
                    <select id="orden-select" class="orden-select">
                        <option value="none">Sin orden</option>
                        <option value="rating">Calificación</option>
                        <option value="alpha">Alfabéticamente</option>
                    </select>
                </div>
            </div>
            <div class="resultados-layout">
                <div class="resultados-lista" id="resultados-lista">
                    
                </div>
            </div>
        </div>
        <div class="resultado-detalle" id="resultado-detalle"></div>
    </main>
    <script src="auth.js"></script>
    <script src="libros.js"></script>
    <script>
    // Verificar autenticación al cargar la página
    document.addEventListener('DOMContentLoaded', function() {
        const userInfo = document.getElementById('user-info');
        const logoutBtn = document.getElementById('logout-btn');
        const loginLink = document.getElementById('login-link');
        
        // Verificar si hay un usuario logueado
        if (auth.isLoggedIn()) {
            // Usuario logueado - mostrar información del usuario y botón de logout
            const currentUser = auth.getCurrentUser();
            if (userInfo && currentUser) {
                userInfo.textContent = `👤 ${currentUser.username}`;
                userInfo.style.display = 'inline';
            }
            if (logoutBtn) {
                logoutBtn.style.display = 'inline-block';
            }
            if (loginLink) {
                loginLink.style.display = 'none';
            }
        } else {
            // Usuario no logueado - mostrar enlace de login
            if (userInfo) {
                userInfo.style.display = 'none';
            }
            if (logoutBtn) {
                logoutBtn.style.display = 'none';
            }
            if (loginLink) {
                loginLink.style.display = 'inline';
            }
        }
        
        // Búsqueda automática por autor si viene en la URL
        const params = new URLSearchParams(window.location.search);
        const autor = params.get('autor');
        if (autor) {
            document.getElementById('title').value = autor;
            document.getElementById('check-titulo').checked = false;
            document.getElementById('check-autor').checked = true;
            document.getElementById('book-form').dispatchEvent(new Event('submit'));
        }
    });
    </script>
</body>
</html>
