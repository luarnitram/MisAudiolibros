<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Libros Leídos</title>
    <link rel="stylesheet" href="libros.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="header">
        <nav>
            <a href="index.html" class="nav-link">Inicio</a>
            <span class="logo">Mis libros leídos</span>
            <div class="nav-links">
                <span id="user-info" class="user-info"></span>
                <button id="logout-btn" class="logout-btn" onclick="logout()" style="display: none;">Cerrar Sesión</button>
                <a href="login.html" id="login-link" class="nav-link" style="display: none;">Iniciar Sesión</a>
            </div>
        </nav>
    </header>
    <main class="main-panel vertical-layout autor-layout">
        <input type="text" id="buscador-libros" placeholder="Buscar por título o autor..." class="buscador-lista">
        <ul class="libros-lista" id="libros-lista"></ul>
        <section class="detalle-panel" id="detalle-panel" style="display:none;"></section>
        <section class="panel-autor" id="panel-autor" style="display:none;"></section>
    </main>
    <div id="modal-portada" class="modal-portada" style="display:none;">
        <div class="modal-portada-bg"></div>
        <div class="modal-portada-content">
            <span class="modal-portada-close">&times;</span>
            <img id="modal-portada-img" src="" alt="Portada ampliada">
        </div>
    </div>
    <script src="auth.js"></script>
    <script src="mis-libros.js"></script>
    <script>
    // Verificar autenticación al cargar la página
    document.addEventListener('DOMContentLoaded', function() {
        const userInfo = document.getElementById('user-info');
        const logoutBtn = document.getElementById('logout-btn');
        const loginLink = document.getElementById('login-link');
        
        // Verificar si hay un usuario logueado
        if (auth.isLoggedIn()) {
            // Usuario logueado - mostrar información del usuario y botón de logout
            const currentUser = auth.getCurrentUser();
            if (userInfo && currentUser) {
                userInfo.textContent = `👤 ${currentUser.username}`;
                userInfo.style.display = 'inline';
            }
            if (logoutBtn) {
                logoutBtn.style.display = 'inline-block';
            }
            if (loginLink) {
                loginLink.style.display = 'none';
            }
        } else {
            // Usuario no logueado - mostrar enlace de login
            if (userInfo) {
                userInfo.style.display = 'none';
            }
            if (logoutBtn) {
                logoutBtn.style.display = 'none';
            }
            if (loginLink) {
                loginLink.style.display = 'inline';
            }
        }
    });
    </script>
</body>
</html>
